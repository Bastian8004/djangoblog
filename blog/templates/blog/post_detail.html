{% extends 'blog/base.html' %}

{% block content %}
<div class="post">
  {% if post.publish_date %}
  <div class="date">
    {{ post.publish_date}}
  </div>
  {% endif %}
  <h2>{{ post.title }}</h2>
  <img class="img" src="{{ Post.image.url }}" alt="Obrazek" width="100">
  <p>{{ post.text|linebreaksbr }}</p>
</div>
{% endblock %}
