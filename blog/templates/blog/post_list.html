{% extends 'blog/base.html' %}
{% block content %}
{% comment "komentarz"  %}
        Tutaj lista postów
        {%endcomment%}
        {% for post in posts %}
    <div class="post">
        <div class="data">
        <p>Opublikowany: {{post.publish_date}}</p>
        </div>
        <h2><a href="">{{post.title}}</a></h2>
        <em>{{post.text|linebreaksbr}}</em>
    </div>
        {% endfor%}
    {% endblock %}
